<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Glow Filters -->
  <defs>
    <filter id="glow-orange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Cyan Orbit -->
  <!-- Note: The major axis is from top-right to bottom-left -->
  <ellipse 
    cx="50" cy="50" rx="42" ry="16" 
    fill="none" stroke="#00D4FF" stroke-width="3" 
    transform="rotate(135 50 50)" 
    filter="url(#glow-cyan)" 
  />

  <!-- Orange Orbit -->
  <!-- Note: The major axis is from top-left to bottom-right -->
  <ellipse 
    cx="50" cy="50" rx="42" ry="16" 
    fill="none" stroke="#FF6B2B" stroke-width="3" 
    transform="rotate(45 50 50)" 
    filter="url(#glow-orange)" 
  />

  <!-- Center Earth Planet -->
  <circle cx="50" cy="50" r="14" fill="#FF6B2B" filter="url(#glow-orange)" />
  
  <!-- Simplified Continents (Dark Navy Blue) -->
  <path 
    d="M 42 45 C 44 41 48 42 50 40 
       C 52 42 53 46 56 43 
       C 57 48 51 51 58 52 
       C 57 56 50 58 48 60 
       C 44 61 40 56 42 53 
       C 45 51 40 48 42 45 Z" 
    fill="#0A1628" 
  />
</svg>
